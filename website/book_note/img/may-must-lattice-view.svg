<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style>
      .title { font: 24px Arial, sans-serif; font-weight:700; fill:#111827; }
      .label { font: 18px Arial, sans-serif; fill:#1f2937; }
      .small { font: 16px Arial, sans-serif; fill:#374151; }
      .node { fill:#f6f3ea; stroke:#2f4f4f; stroke-width:2; rx:10; ry:10; }
      .line { stroke:#2f4f4f; stroke-width:2.5; }
      .arrow { stroke:#b45309; stroke-width:3; fill:none; marker-end:url(#arr); }
      .note { fill:#ecfccb; stroke:#65a30d; stroke-width:1.5; rx:8; ry:8; }
      .warn { fill:#fee2e2; stroke:#dc2626; stroke-width:1.5; rx:8; ry:8; }
      .safe { fill:#dbeafe; stroke:#2563eb; stroke-width:1.5; rx:8; ry:8; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="30" y="34" class="title">Lattice view of may analysis and must analysis</text>

  <text x="120" y="70" class="label">May analysis</text>
  <line x1="180" y1="105" x2="180" y2="255" class="line"/>
  <rect x="120" y="85" width="120" height="38" class="warn"/>
  <text x="148" y="110" class="small">⊤ : safe but coarse</text>
  <rect x="120" y="160" width="120" height="38" class="node"/>
  <text x="162" y="184" class="small">intermediate</text>
  <rect x="120" y="235" width="120" height="38" class="safe"/>
  <text x="148" y="259" class="small">⊥ : precise start</text>
  <path d="M270 250 C330 250, 330 170, 270 170" class="arrow"/>
  <text x="300" y="214" class="small">iterate from ⊥ upward</text>
  <text x="106" y="302" class="small">Least fixed point keeps the most precision among safe results.</text>

  <text x="560" y="70" class="label">Must analysis</text>
  <line x1="620" y1="105" x2="620" y2="255" class="line"/>
  <rect x="560" y="85" width="120" height="38" class="safe"/>
  <text x="586" y="110" class="small">⊤ : precise start</text>
  <rect x="560" y="160" width="120" height="38" class="node"/>
  <text x="602" y="184" class="small">intermediate</text>
  <rect x="560" y="235" width="120" height="38" class="warn"/>
  <text x="591" y="259" class="small">⊥ : safe but coarse</text>
  <path d="M710 105 C770 105, 770 185, 710 185" class="arrow"/>
  <text x="738" y="150" class="small">iterate from ⊤ downward</text>
  <text x="535" y="302" class="small">Greatest fixed point keeps the most precision among safe results.</text>
</svg>
